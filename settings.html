<div id="codex_aux_bridge_settings" class="codex-aux-panel" hidden>
    <div class="codex-aux-panel-header" data-codex-aux-drag>
        <div class="codex-aux-title">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <div>
                <strong>Codex 辅助桥</strong>
                <span>生图辅助任务控制台</span>
            </div>
        </div>
        <div class="codex-aux-header-actions">
            <span class="codex-aux-status">就绪</span>
            <button class="menu_button codex-aux-icon-button" type="button" data-codex-aux-action="reset-panel" title="重置面板位置">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>
            <button class="menu_button codex-aux-icon-button" type="button" data-codex-aux-action="close-panel" title="关闭">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <div class="codex-aux-panel-body">
        <section class="codex-aux-summary">
            <label class="checkbox_label codex-aux-primary-toggle">
                <input type="checkbox" data-codex-aux-setting="enabled">
                <span>启用辅助桥</span>
            </label>
            <div class="codex-aux-actions">
                <button class="menu_button" type="button" data-codex-aux-action="export">导出任务快照</button>
                <button class="menu_button" type="button" data-codex-aux-action="fix-latest">修复最新楼层</button>
            </div>
        </section>

        <section class="codex-aux-section">
            <div class="codex-aux-section-header">
                <h4>上下文与隐私</h4>
            </div>
            <div class="codex-aux-grid">
                <label>
                    <span>最近 AI 楼层数</span>
                    <input class="text_pole" type="number" min="1" max="12" step="1" data-codex-aux-setting="contextAssistantFloors">
                </label>
                <label>
                    <span>每层最大字符</span>
                    <input class="text_pole" type="number" min="200" max="4000" step="100" data-codex-aux-setting="maxCharsPerFloor">
                </label>
            </div>
            <label class="checkbox_label codex-aux-toggle">
                <input type="checkbox" data-codex-aux-setting="redactExplicit">
                <span>导出前过滤显式成人词</span>
            </label>
        </section>

        <section class="codex-aux-section">
            <div class="codex-aux-section-header">
                <h4>格式修复</h4>
            </div>
            <div class="codex-aux-toggle-grid">
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="format.enabled">
                    <span>生图时同步修复目标楼层格式</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="format.wrapTime">
                    <span>裸时间栏包裹为 &lt;time&gt;</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="format.wrapContent">
                    <span>正文包裹为 &lt;content&gt;</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="format.wrapNowPlot">
                    <span>外层额外包裹 &lt;now_plot&gt;</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="format.removeStatusPlaceholder">
                    <span>删除 &lt;StatusPlaceHolderImpl/&gt;</span>
                </label>
            </div>
        </section>

        <section class="codex-aux-section">
            <div class="codex-aux-section-header">
                <h4>世界推衍</h4>
            </div>
            <div class="codex-aux-toggle-grid">
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="world.enabled">
                    <span>生图时执行 Codex 世界推衍</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="world.includeExistingWorldEngineSnapshot">
                    <span>读取当前世界引擎状态快照</span>
                </label>
            </div>
            <label>
                <span>世界推衍模式</span>
                <select class="text_pole" data-codex-aux-setting="world.mode">
                    <option value="codex">Codex 接管</option>
                    <option value="snapshot-only">只导出世界状态</option>
                    <option value="disabled">关闭</option>
                </select>
            </label>
            <div class="codex-aux-grid">
                <label>
                    <span>推衍强度</span>
                    <select class="text_pole" data-codex-aux-setting="world.evolutionIntensity">
                        <option value="conservative">保守：只处理明确变化</option>
                        <option value="balanced">均衡：自然推进</option>
                        <option value="active">活跃：允许更多后台变化</option>
                        <option value="dramatic">剧烈：高冲突高事件密度</option>
                    </select>
                </label>
                <label>
                    <span>时间策略</span>
                    <select class="text_pole" data-codex-aux-setting="world.timePolicy">
                        <option value="strict">严格：必须符合正文时间</option>
                        <option value="infer">推断：缺失时从场景推断</option>
                        <option value="loose">宽松：只保持大体合理</option>
                    </select>
                </label>
                <label>
                    <span>时间尺度</span>
                    <select class="text_pole" data-codex-aux-setting="world.timeScale">
                        <option value="auto">自动识别</option>
                        <option value="minutes">分钟级</option>
                        <option value="hours">小时级</option>
                        <option value="days">天级</option>
                        <option value="scene">按场景段落</option>
                    </select>
                </label>
                <label>
                    <span>地点策略</span>
                    <select class="text_pole" data-codex-aux-setting="world.locationPolicy">
                        <option value="strict">严格：不明确则不移动</option>
                        <option value="infer">推断：按行动和上下文判断</option>
                        <option value="offscreen">允许后台地点变化</option>
                    </select>
                </label>
                <label>
                    <span>单轮最大世界更新数</span>
                    <input class="text_pole" type="number" min="1" max="16" step="1" data-codex-aux-setting="world.maxEventUpdates">
                </label>
            </div>
            <div class="codex-aux-toggle-grid">
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="world.allowOffscreenEvents">
                    <span>允许后台事件自然发生</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="world.requireCausalEvidence">
                    <span>重大变化必须有因果依据</span>
                </label>
            </div>
        </section>

        <section class="codex-aux-section">
            <div class="codex-aux-section-header">
                <h4>资料补全</h4>
            </div>
            <div class="codex-aux-toggle-grid">
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.enabled">
                    <span>生图时执行 Codex 资料补全</span>
                </label>
            </div>
            <div class="codex-aux-grid">
                <label>
                    <span>最大查询数</span>
                    <input class="text_pole" type="number" min="1" max="8" step="1" data-codex-aux-setting="search.maxQueries">
                </label>
                <label>
                    <span>最大来源数</span>
                    <input class="text_pole" type="number" min="1" max="16" step="1" data-codex-aux-setting="search.maxSources">
                </label>
                <label>
                    <span>补全范围</span>
                    <select class="text_pole" data-codex-aux-setting="search.scope">
                        <option value="encyclopedia">百科事实</option>
                        <option value="setting">设定资料</option>
                        <option value="mixed">百科 + 设定</option>
                    </select>
                </label>
            </div>
            <div class="codex-aux-toggle-grid">
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeWeather">
                    <span>补全当前地点天气</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeGlobalNews">
                    <span>补全全球要闻</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeLocalNews">
                    <span>补全当地要闻</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeCalendar">
                    <span>补全节日/日历因素</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeCulture">
                    <span>补全风俗文化因素</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeEconomy">
                    <span>补全经济/物价背景</span>
                </label>
                <label class="checkbox_label codex-aux-toggle">
                    <input type="checkbox" data-codex-aux-setting="search.includeTransport">
                    <span>补全交通/路况背景</span>
                </label>
            </div>
        </section>
    </div>
</div>
