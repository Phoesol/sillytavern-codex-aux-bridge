<div id="codex_aux_bridge_settings" class="inline-drawer codex-aux-bridge-settings">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>Codex 辅助桥</b>
        <button id="codex_aux_close_panel" class="menu_button codex-aux-close" type="button" title="关闭悬浮面板">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="codex-aux-row">
            <label class="checkbox_label">
                <input id="codex_aux_enabled" type="checkbox" data-codex-aux-setting="enabled">
                <span>启用辅助桥</span>
            </label>
            <span id="codex_aux_status" class="codex-aux-status">就绪</span>
        </div>

        <div class="codex-aux-section">
            <h4>上下文与隐私</h4>
            <label>
                <span>最近 AI 楼层数</span>
                <input id="codex_aux_context_floors" class="text_pole" type="number" min="1" max="12" step="1" data-codex-aux-setting="contextAssistantFloors">
            </label>
            <label>
                <span>每层最大字符</span>
                <input id="codex_aux_max_chars" class="text_pole" type="number" min="200" max="4000" step="100" data-codex-aux-setting="maxCharsPerFloor">
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_redact" type="checkbox" data-codex-aux-setting="redactExplicit">
                <span>导出前过滤显式成人词</span>
            </label>
        </div>

        <div class="codex-aux-section">
            <h4>格式修复</h4>
            <label class="checkbox_label">
                <input id="codex_aux_format_enabled" type="checkbox" data-codex-aux-setting="format.enabled">
                <span>生图时同步修复目标楼层格式</span>
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_format_time" type="checkbox" data-codex-aux-setting="format.wrapTime">
                <span>裸时间栏包裹为 &lt;time&gt;</span>
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_format_content" type="checkbox" data-codex-aux-setting="format.wrapContent">
                <span>正文包裹为 &lt;content&gt;</span>
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_format_nowplot" type="checkbox" data-codex-aux-setting="format.wrapNowPlot">
                <span>外层额外包裹 &lt;now_plot&gt;</span>
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_format_placeholder" type="checkbox" data-codex-aux-setting="format.removeStatusPlaceholder">
                <span>删除 &lt;StatusPlaceHolderImpl/&gt;</span>
            </label>
        </div>

        <div class="codex-aux-section">
            <h4>世界推衍</h4>
            <label class="checkbox_label">
                <input id="codex_aux_world_enabled" type="checkbox" data-codex-aux-setting="world.enabled">
                <span>生图时执行 Codex 世界推衍</span>
            </label>
            <label>
                <span>世界推衍模式</span>
                <select id="codex_aux_world_mode" class="text_pole" data-codex-aux-setting="world.mode">
                    <option value="codex">Codex 接管</option>
                    <option value="snapshot-only">只导出世界状态</option>
                    <option value="disabled">关闭</option>
                </select>
            </label>
            <label class="checkbox_label">
                <input id="codex_aux_world_snapshot" type="checkbox" data-codex-aux-setting="world.includeExistingWorldEngineSnapshot">
                <span>兼容读取当前世界引擎状态快照</span>
            </label>
        </div>

        <div class="codex-aux-section">
            <h4>资料补全</h4>
            <label class="checkbox_label">
                <input id="codex_aux_search_enabled" type="checkbox" data-codex-aux-setting="search.enabled">
                <span>生图时执行 Codex 资料补全</span>
            </label>
            <label>
                <span>最大查询数</span>
                <input id="codex_aux_search_max" class="text_pole" type="number" min="1" max="8" step="1" data-codex-aux-setting="search.maxQueries">
            </label>
            <label>
                <span>补全范围</span>
                <select id="codex_aux_search_scope" class="text_pole" data-codex-aux-setting="search.scope">
                    <option value="encyclopedia">百科事实</option>
                    <option value="setting">设定资料</option>
                    <option value="mixed">百科 + 设定</option>
                </select>
            </label>
        </div>

        <div class="codex-aux-actions">
            <input id="codex_aux_export_task" class="menu_button" type="button" value="导出任务快照">
            <input id="codex_aux_fix_latest" class="menu_button" type="button" value="修复最新楼层">
        </div>
    </div>
</div>
